<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SHOWROOM上下速度モニター</title>
    <style>
        html, body { background: transparent; margin: 0; padding: 0; overflow: hidden; }
        #monitor {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px;
            border-radius: 18px;
            width: 250px;
            border: 1px solid rgba(255,255,255,0.2);
            font-family: sans-serif;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .grid { display: flex; justify-content: space-around; margin-bottom: 12px; }
        .label { font-size: 10px; color: #bbb; margin-bottom: 4px; text-transform: uppercase; }
        .value { font-size: 22px; font-weight: bold; color: #00ffcc; text-shadow: 0 0 8px rgba(0,255,204,0.4); }
        #kansai-msg {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: bold;
            border-left: 5px solid #00ffcc;
            min-height: 3em;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .unit { font-size: 12px; margin-left: 2px; color: #888; }
    </style>
</head>
<body>

<div id="monitor">
    <div class="grid">
        <div>
            <div class="label">下り (Download)</div>
            <div id="down-val" class="value">測定中...</div>
        </div>
        <div>
            <div class="label">上り (Upload)</div>
            <div id="up-val" class="value">測定中...</div>
        </div>
    </div>
    <div id="kansai-msg">今、上下の気合測ってるから待っときや！</div>
</div>

<script>
    async function measureSpeed() {
        const downEl = document.getElementById('down-val');
        const upEl = document.getElementById('up-val');
        const msg = document.getElementById('kansai-msg');

        try {
            // --- 下り測定 (Cloudflareの1MBデータ) ---
            const dStart = Date.now();
            const dRes = await fetch("https://speed.cloudflare.com/__down?bytes=1048576&t=" + dStart, { cache: "no-store" });
            const dData = await dRes.blob();
            const dDuration = (Date.now() - dStart) / 1000;
            let dMbps = ( (dData.size * 8) / (1024 * 1024) / dDuration).toFixed(1);

            // --- 上り測定 (より安定したダミーPOST) ---
            const uStart = Date.now();
            // 256KBのダミーデータ（大きすぎるとサーバーに拒否されるので、このくらいがベスト）
            const blob = new Blob([new Uint8Array(256 * 1024)]); 
            
            await fetch("https://httpbin.org/post", {
                method: "POST",
                body: blob,
                mode: "cors"
            });
            
            const uDuration = (Date.now() - uStart) / 1000;
            // 往復の時間を考慮した予測値。300M回線ならここも跳ね上がるはずや！
            let uMbps = ( (blob.size * 8) / (1024 * 1024) / uDuration).toFixed(1);

            // 表示更新
            downEl.innerHTML = dMbps + '<span class="unit">Mbps</span>';
            upEl.innerHTML = uMbps + '<span class="unit">Mbps</span>';

            // 関西弁判定
            if (dMbps > 50 && uMbps > 10) {
                msg.innerText = "【神】上下とも爆速！これもう最強の配信環境やで！";
                msg.style.borderLeftColor = "#00ffcc";
            } else if (dMbps > 10 && uMbps > 3) {
                msg.innerText = "【安定】ええ感じ。これなら高画質でもビクともせえへん。";
                msg.style.borderLeftColor = "#00ffcc";
            } else {
                msg.innerText = "【注意】ちょっと上りが細いか？まあ配信はできるレベルや。";
                msg.style.borderLeftColor = "#ffcc00";
            }

        } catch (e) {
            upEl.innerText = "確認中";
            msg.innerText = "上りがうまく測れんかった…もう一回やってみるわ。";
        }
    }

    // 30秒ごとに更新
    setInterval(measureSpeed, 30000);
    measureSpeed();
</script>
</body>
</html>
