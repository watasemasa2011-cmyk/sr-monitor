<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SHOWROOM上下速度モニター</title>
    <style>
        html, body { background: transparent; margin: 0; padding: 0; overflow: hidden; }
        #monitor {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px;
            border-radius: 18px;
            width: 250px;
            border: 1px solid rgba(255,255,255,0.2);
            font-family: sans-serif;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .grid { display: flex; justify-content: space-around; margin-bottom: 12px; }
        .label { font-size: 10px; color: #bbb; margin-bottom: 4px; text-transform: uppercase; }
        .value { font-size: 22px; font-weight: bold; color: #00ffcc; }
        #kansai-msg {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: bold;
            border-left: 5px solid #00ffcc;
            min-height: 3em;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .unit { font-size: 12px; margin-left: 2px; color: #888; }
    </style>
</head>
<body>

<div id="monitor">
    <div class="grid">
        <div>
            <div class="label">下り (Download)</div>
            <div id="down-val" class="value">測定中...</div>
        </div>
        <div>
            <div class="label">上り (Upload)</div>
            <div id="up-val" class="value">測定中...</div>
        </div>
    </div>
    <div id="kansai-msg">今、回線の様子見てるさかい、ちょっと待ってや...</div>
</div>

<script>
    async function measureSpeed() {
        const downEl = document.getElementById('down-val');
        const upEl = document.getElementById('up-val');
        const msg = document.getElementById('kansai-msg');

        // 下り測定
        try {
            const dStart = Date.now();
            const dRes = await fetch("https://speed.cloudflare.com/__down?bytes=1048576&t=" + dStart, { cache: "no-store" });
            const dBlob = await dRes.blob();
            const dDuration = (Date.now() - dStart) / 1000;
            const dMbps = ((dBlob.size * 8) / (1024 * 1024) / dDuration).toFixed(1);
            downEl.innerHTML = dMbps + '<span class="unit">Mbps</span>';
        } catch (e) {
            downEl.innerText = "Error";
        }

        // 上り測定
        try {
            const uStart = Date.now();
            const blob = new Blob([new Uint8Array(128 * 1024)]); 
            const uRes = await fetch("https://httpbin.org/post", {
                method: "POST",
                body: blob,
                mode: "cors"
            });
            
            if (uRes.ok) {
                const uDuration = (Date.now() - uStart) / 1000;
                const uMbps = ((blob.size * 8) / (1024 * 1024) / uDuration).toFixed(1);
                upEl.innerHTML = uMbps + '<span class="unit">Mbps</span>';
            } else {
                upEl.innerHTML = '--<span class="unit">Mbps</span>';
            }
        } catch (e) {
            upEl.innerHTML = '--<span class="unit">Mbps</span>';
        }

        // 判定メッセージ更新
        const dNum = parseFloat(downEl.innerText);
        if (dNum > 50) {
            msg.innerText = "【絶好調】爆速やんか！ Emilyさんの配信、ガッツリ応援できるで！";
            msg.style.borderLeftColor = "#00ffcc";
        } else if (dNum > 5) {
            msg.innerText = "【安定】ええ感じ。このままいけば配信もバッチリや。";
            msg.style.borderLeftColor = "#ffcc00";
        } else {
            msg.innerText = "【注意】ちょっと回線重いな。磐田の空でも眺めて落ち着こか。";
            msg.style.borderLeftColor = "#ff4444";
        }
    }

    // 初回実行と30秒ごとの更新
    measureSpeed();
    setInterval(measureSpeed, 30000);
</script>
</body>
</html>
