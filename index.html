<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>本気・速度モニター</title>
    <style>
        html, body { background: transparent; margin: 0; padding: 0; overflow: hidden; }
        #monitor {
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px;
            border-radius: 18px;
            width: 240px;
            border: 1px solid rgba(255,255,255,0.2);
            font-family: sans-serif;
            text-align: center;
        }
        .grid { display: flex; justify-content: space-around; margin-bottom: 10px; }
        .label { font-size: 10px; color: #aaa; margin-bottom: 2px; }
        .value { font-size: 24px; font-weight: bold; color: #00ffcc; }
        #kansai-msg {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
            border-left: 5px solid #00ffcc;
        }
    </style>
</head>
<body>

<div id="monitor">
    <div class="grid">
        <div>
            <div class="label">下り実測 (Down)</div>
            <div id="down-val" class="value">測定中</div>
        </div>
    </div>
    <div id="kansai-msg">本気で回線測ってるさかい、ちょっと待ってや...</div>
    <div style="font-size: 9px; color: #666; margin-top: 8px;">
        ※10MBのデータでガチ測定中（1分ごと）
    </div>
</div>

<script>
    async function measureRealSpeed() {
        const downEl = document.getElementById('down-val');
        const msg = document.getElementById('kansai-msg');

        // 測定用ファイル：GitHubなどが提供している大きめのバイナリデータ（約10MB）
        // ここでは、キャッシュの影響を受けにくい大きな画像や公開ファイルを利用
        const testFile = "https://speed.cloudflare.com/__down?bytes=10000000"; // 10MBのダミーデータ
        
        const startTime = Date.now();
        try {
            const response = await fetch(testFile, { cache: "no-store" });
            const reader = response.body.getReader();
            let receivedLength = 0;
            
            // データを実際に読み込む
            while(true) {
                const {done, value} = await reader.read();
                if (done) break;
                receivedLength += value.length;
            }

            const endTime = Date.now();
            const duration = (endTime - startTime) / 1000; // 秒
            const bitsLoaded = receivedLength * 8;
            const speedMbps = (bitsLoaded / duration / (1024 * 1024)).toFixed(1);

            downEl.innerText = speedMbps + " Mbps";

            if (speedMbps > 100) {
                msg.innerText = "【神回線】" + speedMbps + "Mも出とる！磐田で一番速いんちゃうか！？";
                msg.style.borderLeftColor = "#00ffcc";
            } else if (speedMbps > 20) {
                msg.innerText = "【絶好調】これだけ出れば配信も余裕のよっちゃんで！";
                msg.style.borderLeftColor = "#00ffcc";
            } else {
                msg.innerText = "【普通】まあまあやな。配信には十分やで。";
                msg.style.borderLeftColor = "#ffcc00";
            }

        } catch (e) {
            downEl.innerText = "Error";
            msg.innerText = "測定失敗や。ネット繋がっとるか？";
        }
    }

    // 重いデータをやり取りするので、測定間隔は「1分に1回」にしておくわ（配信の邪魔にならんように）
    setInterval(measureRealSpeed, 60000);
    measureRealSpeed();
</script>
</body>
</html>
